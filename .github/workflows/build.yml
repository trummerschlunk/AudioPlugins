name: build

on:
  push:

jobs:
  linux:
    strategy:
      matrix:
        target: [linux-arm64, linux-armhf, linux-i686, linux-riscv64, linux-x86_64]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Cache faustpp build
        uses: actions/cache@v4
        id: faustpp
        with:
          path: build/faustpp/faustpp
          key: faustpp-${{ matrix.target }}
      - uses: distrho/dpf-makefile-action@v1
        with:
          target: ${{ matrix.target }}
          lto: true
          faust: true

  macos:
    strategy:
      matrix:
        target: [macos-10.15, macos-universal-10.15]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Cache faustpp build
        uses: actions/cache@v4
        id: faustpp
        with:
          path: build/faustpp/faustpp
          key: faustpp-${{ matrix.target }}
      - uses: distrho/dpf-makefile-action@v1
        env:
          MACOS_APP_CERTIFICATE: ${{ secrets.MACOS_APP_CERTIFICATE }}
          MACOS_INSTALLER_CERTIFICATE: ${{ secrets.MACOS_INSTALLER_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_NOTARIZATION_USER: ${{ secrets.MACOS_NOTARIZATION_USER }}
          MACOS_NOTARIZATION_PASS: ${{ secrets.MACOS_NOTARIZATION_PASS }}
          MACOS_NOTARIZATION_TEAM: ${{ secrets.MACOS_NOTARIZATION_TEAM }}
        with:
          target: ${{ matrix.target }}
          lto: true
          faust: true

  windows:
    strategy:
      matrix:
        target: [win32, win64]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Cache faustpp build
        uses: actions/cache@v4
        id: faustpp
        with:
          path: build/faustpp/faustpp
          key: faustpp-${{ matrix.target }}
      - name: Build native faustpp first
        run: |
          make faustpp -j $(nproc)
      - uses: distrho/dpf-makefile-action@v1
        with:
          target: ${{ matrix.target }}
          lto: true
          faust: true
